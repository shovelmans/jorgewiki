<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarifario Informático</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Tarifario Informático</h1>
    <p>Consultas de tablas</p>
  </header>

  <main>
    <section class="contenedor">
      <h2>Tablas disponibles</h2>
      <div id="botones-tablas"></div>
    </section>

    <section class="contenedor">
      <h2 id="titulo-tabla">Selecciona una tabla</h2>
      <table id="tabla-datos">
        <thead id="tabla-head"></thead>
        <tbody id="tabla-body"></tbody>
      </table>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
