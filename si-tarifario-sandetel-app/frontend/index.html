<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarifario Informático</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Tarifario Informático</h1>
    <p>Listado de productos</p>
  </header>

  <main>
    <section class="contenedor">
      <table id="tabla-productos">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Marca</th>
            <th>Categoría</th>
            <th>Modelo</th>
            <th>SKU</th>
            <th>Precio</th>
            <th>Stock</th>
          </tr>
        </thead>
        <tbody id="productos-body">
        </tbody>
      </table>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
