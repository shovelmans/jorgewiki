server:
  port: 8080

spring:
  application:
    name: tarifario

  datasource:
    url: jdbc:mariadb://localhost:3306/tarifario
    username: tarifario
    password: password
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MariaDBDialect