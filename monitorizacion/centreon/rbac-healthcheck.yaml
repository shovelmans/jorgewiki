apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-healthcheck
  namespace: centreon

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: k8s-healthcheck
  namespace: centreon
rules:
- apiGroups: [""]
  resources:
  - pods
  verbs: ["get","list"]
- apiGroups: ["apps"]
  resources:
  - deployments
  verbs: ["get","list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k8s-healthcheck
  namespace: centreon
subjects:
- kind: ServiceAccount
  name: k8s-healthcheck
  namespace: centreon
roleRef:
  kind: Role
  name: k8s-healthcheck
  apiGroup: rbac.authorization.k8s.io