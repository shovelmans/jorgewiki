apiVersion: apps/v1
kind: Deployment
metadata:
  name: tarifario-backend-v2
  namespace: tarifario
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tarifario-backend-v2
  template:
    metadata:
      labels:
        app: tarifario-backend-v2
    spec:
      containers:
        - name: backend
          image: tarifario-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          env:
            - name: DB_HOST
              value: mariadb
            - name: DB_PORT
              value: "3306"
            - name: DB_USER
              value: tarifario
            - name: DB_PASSWORD
              value: password
            - name: DB_NAME
              value: tarifario