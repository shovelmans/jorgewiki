backend:
  name: tarifario-backend
  replicas: 1
  port: 5000
  image:
    repository: shovelman/backend
    tag: "latest"
    pullPolicy: Always
  service:
    name: tarifario-backend
    type: ClusterIP
    port: 5000
    targetPort: 5000
  database:
    host: mariadb
    port: 3306
    name: tarifario
    user: tarifario
    password: password
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 300m
      memory: 512Mi
  probes:
    readiness:
      initialDelaySeconds: 10
      timeoutSeconds: 3
      periodSeconds: 10
      successThreshold: 1
      failureThreshold: 3
      path: /health
    liveness:
      initialDelaySeconds: 20
      timeoutSeconds: 3
      periodSeconds: 15
      successThreshold: 1
      failureThreshold: 3
      path: /health
