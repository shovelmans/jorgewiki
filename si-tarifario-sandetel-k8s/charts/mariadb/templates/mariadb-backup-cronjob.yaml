apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Values.mariadb.name }}-backup
  labels:
    app: {{ .Values.mariadb.name }}
spec:
  schedule: "0 10 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: mariadb-backup
              image: {{ .Values.mariadb.image | quote }}
              env:
                - name: MYSQL_USER
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.mariadb.secretName }}
                      key: database-user
                - name: MYSQL_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.mariadb.secretName }}
                      key: database-password
                - name: MYSQL_DATABASE
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.mariadb.secretName }}
                      key: database-name
              command:
                - /bin/sh
                - -c
                - |
                  DATE=$(date +%Y-%m-%d)
                  BACKUP_FILE="/backup/tarifario-${DATE}.sql.gz"
                  echo "[BACKUP] Iniciando dump - ${DATE}"
                  mysqldump -h {{ .Values.mariadb.serviceName }} \
                    -u "$MYSQL_USER" \
                    -p"$MYSQL_PASSWORD" \
                    --single-transaction \
                    --routines \
                    --triggers \
                    --events \
                    "$MYSQL_DATABASE" | gzip > "$BACKUP_FILE"
                  echo "[BACKUP] Dump completado: ${BACKUP_FILE}"
                  echo "[BACKUP] Tamaño: $(du -sh $BACKUP_FILE | cut -f1)"
                  echo "[BACKUP] Eliminando backups de mas de 7 dias..."
                  find /backup -name "tarifario-*.sql.gz" -mtime +7 -delete
                  echo "[BACKUP] Backups disponibles:"
                  ls -lh /backup/tarifario-*.sql
              volumeMounts:
                - name: mariadb-backup
                  mountPath: /backup
          volumes:
            - name: mariadb-backup
              persistentVolumeClaim:
                claimName: {{ .Values.mariadb.backupPvcName }}
