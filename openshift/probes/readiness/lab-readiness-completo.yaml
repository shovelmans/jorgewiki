apiVersion: v1
kind: Namespace
metadata:
  name: lab-readiness
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-readiness
  namespace: lab-readiness
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-readiness
  template:
    metadata:
      labels:
        app: nginx-readiness
    spec:
      containers:
        - name: nginx
          image: nginx:stable
          command: ["/bin/sh"]
          args:
            - -c
            - |
              echo "Arrancando app...";
              sleep 30;
              nginx -g "daemon off;"
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 3
            timeoutSeconds: 1
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-readiness
  namespace: lab-readiness
spec:
  selector:
    app: nginx-readiness
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80